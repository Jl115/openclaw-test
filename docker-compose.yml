version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: openclaw-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-openclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openclaw123}
      POSTGRES_DB: ${DB_NAME:-biography}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openclaw} -d ${DB_NAME:-biography}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
